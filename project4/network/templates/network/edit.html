{% extends "network/layout.html" %}

{% block body %}
    <div class="container-fluid">
        <div class="row mt-3">
            <h3 class="col-12 text-left pl-5">Edit Post</h3>
        </div>
        <div class="row justify-content-center px-5">
            <form class="col-12" action="{% url 'edit' post.id %}" method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    <textarea name="content" rows="10" cols="50"
                    class="form-control">
                    {{post.content}}
                    </textarea>
                </div>
                
                <div class="col-12 text-right">
                    <button type="submit" class="col-1 btn btn-primary">Edit</button>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
